name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version in package.json
        run: |
          jq --arg version "${{ steps.get_version.outputs.VERSION }}" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Update version in tauri.conf.json
        run: |
          jq --arg version "${{ steps.get_version.outputs.VERSION }}" '.version = $version' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pkg-config and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsqlite3-dev \
            build-essential \
            cmake

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build
        env:
          RUST_BACKTRACE: 1

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blumbotron-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version in package.json
        shell: bash
        run: |
          jq --arg version "${{ steps.get_version.outputs.VERSION }}" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Update version in tauri.conf.json
        shell: bash
        run: |
          jq --arg version "${{ steps.get_version.outputs.VERSION }}" '.version = $version' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blumbotron-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version in package.json
        run: |
          jq --arg version "${{ steps.get_version.outputs.VERSION }}" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Update version in tauri.conf.json
        run: |
          jq --arg version "${{ steps.get_version.outputs.VERSION }}" '.version = $version' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build

      - name: Ad-hoc sign macOS app and recreate DMG
        run: |
          # Find and sign all .app bundles with ad-hoc signature
          APP_PATH=$(find src-tauri/target/release/bundle/macos -name "*.app" -print -quit)
          echo "Signing app at: $APP_PATH"
          codesign --force --deep --sign - "$APP_PATH"

          # Verify signing
          codesign -dv "$APP_PATH"

          # Remove old DMG and create new one from signed .app
          rm -f src-tauri/target/release/bundle/dmg/*.dmg
          APP_NAME=$(basename "$APP_PATH" .app)
          hdiutil create -volname "$APP_NAME" -srcfolder "$APP_PATH" -ov -format UDZO "src-tauri/target/release/bundle/dmg/${APP_NAME}.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blumbotron-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          retention-days: 30

  # Raspberry Pi build temporarily disabled due to cross-compilation complexity
  # For Raspberry Pi support:
  # 1. Build natively on Raspberry Pi hardware, or
  # 2. Use Docker with ARM emulation, or  
  # 3. Set up complex cross-compilation with proper ARM64 system libraries

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create version-agnostic copies for latest downloads
        run: |
          # Create copies with version-agnostic names for "latest" download links
          find blumbotron-linux -name "*.deb" -exec sh -c 'cp "$1" "$(dirname "$1")/blumbotron_amd64.deb"' _ {} \;
          find blumbotron-windows -name "*_en-US.msi" -exec sh -c 'cp "$1" "$(dirname "$1")/blumbotron_x64_en-US.msi"' _ {} \;
          find blumbotron-macos -name "*.dmg" -exec sh -c 'cp "$1" "$(dirname "$1")/blumbotron_x64.dmg"' _ {} \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            blumbotron-linux/**/*
            blumbotron-windows/**/*
            blumbotron-macos/**/*
          draft: false
          prerelease: false
          generate_release_notes: true 