name: Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
      tag_exists: ${{ steps.check_tag.outputs.EXISTS }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: get_version
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Check if release tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.get_version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

  build-linux:
    needs: [check-version]
    if: needs.check-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pkg-config and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsqlite3-dev \
            build-essential \
            cmake

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build
        env:
          RUST_BACKTRACE: 1

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blumbotron-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 7

  build-windows:
    needs: [check-version]
    if: needs.check-version.outputs.tag_exists == 'false'
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blumbotron-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  build-macos:
    needs: [check-version]
    if: needs.check-version.outputs.tag_exists == 'false'
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build

      - name: Ad-hoc sign macOS app
        run: |
          APP_PATH=$(find src-tauri/target/release/bundle/macos -name "*.app" -print -quit)
          echo "Signing app at: $APP_PATH"
          codesign --force --deep --sign - "$APP_PATH"
          codesign -dv "$APP_PATH"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blumbotron-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 7

  release:
    needs: [check-version, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create version-agnostic copies for latest downloads
        run: |
          # Create copies with version-agnostic names for "latest" download links
          find blumbotron-linux -name "*.deb" -exec sh -c 'cp "$1" "$(dirname "$1")/blumbotron_amd64.deb"' _ {} \;
          find blumbotron-windows -name "*_en-US.msi" -exec sh -c 'cp "$1" "$(dirname "$1")/blumbotron_x64_en-US.msi"' _ {} \;
          find blumbotron-macos -name "*.dmg" -exec sh -c 'cp "$1" "$(dirname "$1")/blumbotron_x64.dmg"' _ {} \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          files: |
            blumbotron-linux/**/*.deb
            blumbotron-linux/**/*.AppImage
            blumbotron-windows/**/*.msi
            blumbotron-windows/**/*.exe
            blumbotron-macos/**/*.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
